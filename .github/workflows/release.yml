name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          # Find first valid Xcode path (no trailing newline issues)
          for xcode in /Applications/Xcode*.app; do
            if [ -d "$xcode" ]; then
              sudo xcode-select -s "$xcode"
              echo "Selected Xcode: $xcode"
              break
            fi
          done
      - name: Verify version consistency
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) != VERSION file ($FILE_VERSION)"
            exit 1
          fi
      - name: Build Release DMG
        run: bash build-release.sh
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: dist/*.dmg

  release:
    needs: build
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dmg/*.dmg
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
      - name: Update Homebrew Tap
        env:
          GH_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          SHA=$(shasum -a 256 dmg/*.dmg | awk '{print $1}')
          bash scripts/update-homebrew-tap.sh \
            --version "$VERSION" \
            --aarch64-sha "$SHA"
