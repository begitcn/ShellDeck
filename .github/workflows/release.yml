name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'
      - name: Verify version consistency
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) != VERSION file ($FILE_VERSION)"
            exit 1
          fi
      - name: Build Release DMG
        env:
          MACOSX_DEPLOYMENT_TARGET: 26.2
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGNING_ALLOWED: NO
        run: bash build-release.sh
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: dist/*.dmg

  release:
    needs: build
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dmg/*.dmg
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
      - name: Update Homebrew Tap
        env:
          GH_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          SHA=$(shasum -a 256 dmg/*.dmg | awk '{print $1}')
          bash scripts/update-homebrew-tap.sh \
            --version "$VERSION" \
            --aarch64-sha "$SHA"
